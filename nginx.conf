server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index revenue-infrastruc-43.html;

    location / {
        try_files $uri $uri/ /revenue-infrastruc-43.html;
    }

    location ~* \.html$ {
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /sitemap.xml {
        add_header Content-Type "application/xml";
    }

    location = /robots.txt {
        add_header Content-Type "text/plain";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml;
    gzip_min_length 256;
}
