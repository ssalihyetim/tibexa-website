server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Custom 404 page with proper status code ──
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Block WordPress / PHP probes (return 410 Gone) ──
    location ~* ^/(wp-admin|wp-login|wp-content|wp-includes|wordpress|xmlrpc\.php|wp-cron\.php) {
        return 410;
    }
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 410;
    }

    # ── Common crawl traps — instant reject ──
    location ~* ^/(\.env|\.git|\.aws|admin|login|phpmyadmin|mysql|backup|config\.json|\.well-known/security\.txt) {
        return 410;
    }

    # ── Serve actual files, otherwise 404 ──
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Cache headers ──
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /sitemap.xml {
        add_header Content-Type "application/xml";
    }

    location = /robots.txt {
        add_header Content-Type "text/plain";
    }

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml;
    gzip_min_length 256;
}
